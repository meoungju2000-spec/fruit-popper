<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍎 Fruit Popper</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

:root {
  --p1:#4FC3F7; --p2:#F48FB1; --gold:#FFD740; --bg:#080812;
  --green:#69F0AE; --orange:#FFAB40;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; cursor:none; }
#game-container { position:relative; width:100vw; height:100vh; }

video {
  transform:scaleX(-1); position:absolute; width:100%; height:100%;
  object-fit:cover; opacity:0; pointer-events:none;
}
canvas {
  position:absolute; top:0; left:0;
  transform:scaleX(-1); width:100%; height:100%;
}

/* ══════════════════════════════════
   공통 메뉴 화면
══════════════════════════════════ */
.menu-screen {
  position:absolute; inset:0; z-index:50;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 40%, #1a1030 0%, #080812 70%);
}
.menu-screen.hidden { display:none; }

.menu-fruit-bg { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
.menu-fruit-bg span {
  position:absolute; opacity:0.12; user-select:none;
  animation:floatFruit linear infinite;
}
@keyframes floatFruit {
  from { transform:translateY(110vh) rotate(0deg); }
  to   { transform:translateY(-20vh) rotate(360deg); }
}

.menu-logo {
  font-family:'Fredoka One',cursive;
  font-size:clamp(46px,7.5vw,88px); color:#fff;
  letter-spacing:2px; text-align:center; line-height:1;
  position:relative; z-index:1;
}
.menu-logo span { color:var(--gold); }

.menu-sub {
  font-size:clamp(11px,1.3vw,15px); color:rgba(255,255,255,.35);
  letter-spacing:4px; text-transform:uppercase;
  margin-top:8px; margin-bottom:40px;
  position:relative; z-index:1;
}

.back-btn {
  position:absolute; top:24px; left:28px; z-index:2;
  background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.14);
  border-radius:12px; padding:8px 18px;
  font-family:'Fredoka One',cursive; font-size:15px; color:rgba(255,255,255,.55);
  cursor:pointer; transition:background .15s, color .15s;
}
.back-btn:hover { background:rgba(255,255,255,.13); color:#fff; }

.step-indicator { display:flex; gap:8px; margin-bottom:30px; position:relative; z-index:1; }
.step-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.18); transition:background .3s; }
.step-dot.active { background:var(--gold); }

.card-row {
  display:flex; gap:20px; flex-wrap:wrap;
  justify-content:center; padding:0 20px;
  position:relative; z-index:1;
}

.sel-card {
  width:clamp(175px,23vw,255px);
  background:rgba(255,255,255,.04); border:2px solid rgba(255,255,255,.1);
  border-radius:22px; padding:30px 22px 26px;
  display:flex; flex-direction:column; align-items:center; gap:11px;
  cursor:pointer; position:relative; overflow:hidden;
  transition:transform .2s, border-color .2s, box-shadow .2s;
}
.sel-card::before {
  content:''; position:absolute; inset:0; border-radius:20px;
  opacity:0; transition:opacity .2s;
}
.sel-card:hover { transform:translateY(-5px) scale(1.03); }
.sel-card:hover::before { opacity:1; }

.sel-card.solo::before   { background:radial-gradient(ellipse at 50% 0%,rgba(79,195,247,.2) 0%,transparent 70%); }
.sel-card.versus::before { background:radial-gradient(ellipse at 50% 0%,rgba(244,143,177,.2) 0%,transparent 70%); }
.sel-card.finger::before { background:radial-gradient(ellipse at 50% 0%,rgba(105,240,174,.2) 0%,transparent 70%); }
.sel-card.fist::before   { background:radial-gradient(ellipse at 50% 0%,rgba(255,171,64,.2) 0%,transparent 70%); }

.sel-card.solo:hover   { border-color:var(--p1);    box-shadow:0 12px 40px rgba(79,195,247,.25); }
.sel-card.versus:hover { border-color:var(--p2);    box-shadow:0 12px 40px rgba(244,143,177,.25); }
.sel-card.finger:hover { border-color:var(--green); box-shadow:0 12px 40px rgba(105,240,174,.25); }
.sel-card.fist:hover   { border-color:var(--orange);box-shadow:0 12px 40px rgba(255,171,64,.25); }

.sel-icon  { font-size:48px; line-height:1; }
.sel-title { font-family:'Fredoka One',cursive; font-size:23px; }
.sel-card.solo   .sel-title { color:var(--p1); }
.sel-card.versus .sel-title { color:var(--p2); }
.sel-card.finger .sel-title { color:var(--green); }
.sel-card.fist   .sel-title { color:var(--orange); }
.sel-desc { font-size:12.5px; color:rgba(255,255,255,.42); text-align:center; line-height:1.6; }
.sel-badge {
  padding:5px 14px; border-radius:999px;
  font-size:10px; font-weight:900; letter-spacing:2px; text-transform:uppercase;
}
.sel-card.solo   .sel-badge { background:rgba(79,195,247,.15);  color:var(--p1); }
.sel-card.versus .sel-badge { background:rgba(244,143,177,.15); color:var(--p2); }
.sel-card.finger .sel-badge { background:rgba(105,240,174,.15); color:var(--green); }
.sel-card.fist   .sel-badge { background:rgba(255,171,64,.15);  color:var(--orange); }

/* ══════════════════════════════════
   인게임 HUD
══════════════════════════════════ */
#hud {
  position:absolute; top:0; left:0; right:0; z-index:20;
  display:none; justify-content:space-between; align-items:center;
  padding:14px 22px; pointer-events:none;
}
.hud-player { display:flex; flex-direction:column; gap:2px; }
.hud-player.p2-side { align-items:flex-end; }
.hud-label { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.4); }
.hud-score { font-family:'Fredoka One',cursive; font-size:48px; color:#fff; line-height:1; }
.p1-side  .hud-score  { text-shadow:0 0 20px var(--p1); }
.p2-side  .hud-score  { text-shadow:0 0 20px var(--p2); }
.solo-side .hud-score { text-shadow:0 0 20px var(--gold); }
.hud-combo { font-size:12px; font-weight:700; opacity:.65; }
.p1-side  .hud-combo  { color:var(--p1); }
.p2-side  .hud-combo  { color:var(--p2); }
.solo-side .hud-combo { color:var(--gold); }

.hud-center { display:flex; flex-direction:column; align-items:center; gap:4px; }
#timer-ring { position:relative; width:72px; height:72px; }
#timer-ring svg { transform:rotate(-90deg); }
#timer-ring circle.bg { fill:none; stroke:rgba(255,255,255,.08); stroke-width:5; }
#timer-ring circle.fg {
  fill:none; stroke:var(--gold); stroke-width:5; stroke-linecap:round;
  stroke-dasharray:201; stroke-dashoffset:0;
  transition:stroke-dashoffset .9s linear, stroke .4s;
}
#timer-num {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Fredoka One',cursive; font-size:24px; color:#fff;
}
.hud-mode-badge { font-size:10px; letter-spacing:3px; color:rgba(255,255,255,.3); text-transform:uppercase; }

#pause-btn {
  position:absolute; top:16px; right:22px; z-index:21; display:none;
  width:40px; height:40px; background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.15); border-radius:12px;
  cursor:pointer; align-items:center; justify-content:center;
  font-size:18px; color:#fff; pointer-events:all;
  transition:background .15s, transform .1s;
}
#pause-btn:hover { background:rgba(255,255,255,.15); transform:scale(1.08); }

/* ══════════════════════════════════
   오버레이
══════════════════════════════════ */
.overlay {
  position:absolute; inset:0; z-index:40; display:none;
  flex-direction:column; align-items:center; justify-content:center;
  background:rgba(8,8,18,.82); backdrop-filter:blur(10px);
}
.overlay.show { display:flex; }

#overlay-countdown { background:transparent; backdrop-filter:none; pointer-events:none; }
#countdown-num {
  font-family:'Fredoka One',cursive; font-size:clamp(120px,22vw,200px);
  color:var(--gold); text-shadow:0 0 80px rgba(255,215,64,.5); opacity:0;
}

#overlay-pause .pause-title {
  font-family:'Fredoka One',cursive; font-size:52px; color:#fff; letter-spacing:2px;
}
#overlay-pause .pause-sub { margin-top:8px; font-size:15px; color:rgba(255,255,255,.4); letter-spacing:2px; }
.pause-btns { display:flex; flex-direction:column; gap:14px; margin-top:44px; }
.ov-btn {
  padding:14px 52px; border-radius:999px;
  font-family:'Fredoka One',cursive; font-size:20px;
  cursor:pointer; border:none; transition:transform .15s, box-shadow .15s;
}
.ov-btn.primary   { background:var(--gold); color:#1a1a1a; box-shadow:0 4px 24px rgba(255,215,64,.35); }
.ov-btn.primary:hover { transform:scale(1.05); box-shadow:0 6px 32px rgba(255,215,64,.55); }
.ov-btn.secondary { background:rgba(255,255,255,.07); color:rgba(255,255,255,.7); border:1.5px solid rgba(255,255,255,.15); }
.ov-btn.secondary:hover { background:rgba(255,255,255,.13); transform:scale(1.02); }

#overlay-result .result-title {
  font-family:'Fredoka One',cursive; font-size:clamp(38px,6.5vw,68px);
  animation:pulse 1s infinite alternate;
}
@keyframes pulse { from{transform:scale(1)} to{transform:scale(1.05)} }
#overlay-result .result-sub { margin-top:10px; font-size:18px; color:rgba(255,255,255,.55); }
.result-scores { display:flex; gap:48px; margin-top:28px; }
.result-player { display:flex; flex-direction:column; align-items:center; gap:6px; }
.result-player .rp-label { font-family:'Fredoka One',cursive; font-size:13px; letter-spacing:3px; }
.result-player .rp-score { font-family:'Fredoka One',cursive; font-size:52px; color:#fff; }
.result-btns { display:flex; gap:14px; margin-top:36px; flex-wrap:wrap; justify-content:center; }

#divider {
  position:absolute; top:0; bottom:0; left:50%; width:2px; display:none;
  background:linear-gradient(to bottom,transparent,rgba(255,255,255,.1) 30%,rgba(255,255,255,.1) 70%,transparent);
  z-index:5; pointer-events:none;
}

#status {
  position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
  z-index:20; background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.1);
  border-radius:999px; padding:7px 20px; font-size:13px; color:rgba(255,255,255,.5);
  letter-spacing:1px; backdrop-filter:blur(6px); pointer-events:none; white-space:nowrap;
}

/* 슬래시 섬광 */
@keyframes slashGlow {
  0%   { opacity:1; transform:scaleX(1); }
  100% { opacity:0; transform:scaleX(2.5); }
}
</style>
</head>
<body>
<div id="game-container">
  <video id="webcam" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

  <!-- STEP 1: 모드 선택 -->
  <div class="menu-screen" id="screen-mode">
    <div class="menu-fruit-bg" id="menuFruitBg"></div>
    <div class="menu-logo">🍎 FRUIT<span>POPPER</span></div>
    <div class="menu-sub">손으로 과일을 터뜨려라</div>
    <div class="step-indicator">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>
    <div class="card-row">
      <div class="sel-card solo" onclick="selectMode('solo')">
        <div class="sel-icon">☝️</div>
        <div class="sel-title">1인 플레이</div>
        <div class="sel-desc">혼자서 60초 동안<br>최고 점수에 도전!</div>
        <div class="sel-badge">SOLO</div>
      </div>
      <div class="sel-card versus" onclick="selectMode('versus')">
        <div class="sel-icon">🤜🤛</div>
        <div class="sel-title">2인 대전</div>
        <div class="sel-desc">두 손을 P1·P2로 인식<br>더 많이 터뜨리면 승!</div>
        <div class="sel-badge">VS MODE</div>
      </div>
    </div>
  </div>

  <!-- STEP 2: 도구 선택 -->
  <div class="menu-screen hidden" id="screen-tool">
    <div class="menu-fruit-bg" id="menuFruitBg2"></div>
    <button class="back-btn" onclick="goBackToMode()">← 뒤로</button>
    <div class="menu-logo">도구 선택</div>
    <div class="menu-sub">어떻게 터뜨릴까요?</div>
    <div class="step-indicator">
      <div class="step-dot"></div>
      <div class="step-dot active"></div>
    </div>
    <div class="card-row">
      <div class="sel-card finger" onclick="selectTool('finger')">
        <div class="sel-icon">☝️</div>
        <div class="sel-title">검지 손가락</div>
        <div class="sel-desc">검지 끝을 과일에 갖다 대면<br>바로 터짐!</div>
        <div class="sel-badge">FINGER</div>
      </div>
      <div class="sel-card fist" onclick="selectTool('slash')">
        <div class="sel-icon">🗡️</div>
        <div class="sel-title">칼 슬래시</div>
        <div class="sel-desc">손을 빠르게 휘두르면<br>칼날이 과일을 두 조각으로!</div>
        <div class="sel-badge">SLASH</div>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-player p1-side" id="hud-p1">
      <div class="hud-label" id="hud-p1-label">SCORE</div>
      <div class="hud-score" id="hud-p1-score">0</div>
      <div class="hud-combo"  id="hud-p1-combo">x1 combo</div>
    </div>
    <div class="hud-center">
      <div id="timer-ring">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="bg" cx="36" cy="36" r="32"/>
          <circle class="fg" id="timer-arc" cx="36" cy="36" r="32"/>
        </svg>
        <div id="timer-num">60</div>
      </div>
      <div class="hud-mode-badge" id="hud-badge">SOLO · FINGER</div>
    </div>
    <div class="hud-player p2-side" id="hud-p2">
      <div class="hud-label" id="hud-p2-label">COMBO</div>
      <div class="hud-score" id="hud-p2-score">—</div>
      <div class="hud-combo"  id="hud-p2-combo"></div>
    </div>
  </div>

  <button id="pause-btn" onclick="togglePause()">⏸</button>
  <div id="divider"></div>
  <div id="status">📷 카메라 연결 중...</div>

  <div class="overlay" id="overlay-countdown"><div id="countdown-num"></div></div>

  <div class="overlay" id="overlay-pause">
    <div class="pause-title">⏸ 일시정지</div>
    <div class="pause-sub">게임이 멈춰있습니다</div>
    <div class="pause-btns">
      <button class="ov-btn primary"   onclick="togglePause()">▶ 계속하기</button>
      <button class="ov-btn secondary" onclick="goToMenu()">🏠 처음으로</button>
    </div>
  </div>

  <div class="overlay" id="overlay-result">
    <div class="result-title" id="result-title"></div>
    <div class="result-sub"   id="result-sub"></div>
    <div class="result-scores" id="result-scores"></div>
    <div class="result-btns">
      <button class="ov-btn primary"   onclick="restartSameMode()">🔄 다시 하기</button>
      <button class="ov-btn secondary" onclick="goToMenu()">🏠 처음으로</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════
//  상수 / 상태
// ══════════════════════════════════
const GAME_DURATION = 60;
const EMOJIS = ['🍎','🍊','🍋','🍇','🍓','🍉','🍑','🍒','🥝','🍌'];
const SLASH_TRAIL_LEN  = 18;
const SLASH_SPEED_MIN  = 22;
const SLASH_HIT_WIDTH  = 28;

// 특수 아이템 설정
const SPECIAL = {
  bomb:  { emoji:'💣', prob:0.12, score:-30, color:'#FF5252' },
  bonus: { emoji:'⭐', prob:0.08, score:50,  color:'#FFD740' },
  ice:   { emoji:'🧊', prob:0.07, score:15,  color:'#80DEEA' },
};

// 레벨 구간 (경과 시간 기준)
const LEVELS = [
  { t:0,  spawnRate:0.022, speedMult:1.0,  label:'LV.1' },
  { t:15, spawnRate:0.030, speedMult:1.25, label:'LV.2' },
  { t:30, spawnRate:0.040, speedMult:1.55, label:'LV.3' },
  { t:45, spawnRate:0.055, speedMult:1.90, label:'LV.4 🔥' },
];

const video    = document.getElementById('webcam');
const canvas   = document.getElementById('gameCanvas');
const ctx      = canvas.getContext('2d');
const statusEl = document.getElementById('status');

// ══════════════════════════════════
//  Web Audio 사운드
// ══════════════════════════════════
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// 슬래시 효과음: 날카로운 칙! 소리
function playSlashSound(combo=1) {
  const ac = getAudio();
  const now = ac.currentTime;

  // 노이즈 버퍼 (치찰음)
  const bufLen = ac.sampleRate * 0.12;
  const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0; i<bufLen; i++) data[i] = (Math.random()*2-1) * (1 - i/bufLen);

  const src = ac.createBufferSource();
  src.buffer = buf;

  // 밴드패스: 슬래시 느낌 주파수 강조
  const bp = ac.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 2800 + combo * 200; // 콤보 높을수록 더 날카롭게
  bp.Q.value = 1.8;

  // 고역 강조
  const hi = ac.createBiquadFilter();
  hi.type = 'highshelf';
  hi.frequency.value = 4000;
  hi.gain.value = 10;

  const gain = ac.createGain();
  gain.gain.setValueAtTime(0.55, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

  src.connect(bp); bp.connect(hi); hi.connect(gain); gain.connect(ac.destination);
  src.start(now);
  src.stop(now + 0.12);
}

// 손가락 터뜨리기 효과음: 통통 튀는 팝!
function playPopSound(combo=1) {
  const ac = getAudio();
  const now = ac.currentTime;

  // 사인파 기반 팝 소리
  const osc = ac.createOscillator();
  osc.type = 'sine';
  const baseFreq = 300 + combo * 40;
  osc.frequency.setValueAtTime(baseFreq * 1.5, now);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.6, now + 0.08);

  // 노이즈 레이어 (터지는 느낌)
  const nBuf = ac.createBuffer(1, ac.sampleRate * 0.05, ac.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i=0; i<nd.length; i++) nd[i] = (Math.random()*2-1) * (1 - i/nd.length);
  const nSrc = ac.createBufferSource();
  nSrc.buffer = nBuf;

  const nGain = ac.createGain();
  nGain.gain.setValueAtTime(0.3, now);
  nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);

  const gain = ac.createGain();
  gain.gain.setValueAtTime(0.5, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

  osc.connect(gain); gain.connect(ac.destination);
  nSrc.connect(nGain); nGain.connect(ac.destination);

  osc.start(now); osc.stop(now + 0.1);
  nSrc.start(now); nSrc.stop(now + 0.05);
}

// 콤보 3 이상 추가 효과음
function playComboSound(combo) {
  const ac = getAudio();
  const now = ac.currentTime;
  const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
  const count = Math.min(combo - 2, notes.length);
  for (let i=0; i<count; i++) {
    const osc = ac.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = notes[i];
    const g = ac.createGain();
    g.gain.setValueAtTime(0.18, now + i*0.06);
    g.gain.exponentialRampToValueAtTime(0.001, now + i*0.06 + 0.12);
    osc.connect(g); g.connect(ac.destination);
    osc.start(now + i*0.06);
    osc.stop(now + i*0.06 + 0.13);
  }
}

// 폭탄 효과음: 둔탁한 쿵!
function playBombSound() {
  const ac = getAudio(); const now = ac.currentTime;
  const osc = ac.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(120, now);
  osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.8, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.35);
  osc.connect(g); g.connect(ac.destination);
  osc.start(now); osc.stop(now+0.35);
}

// 얼음 효과음: 맑은 딩~
function playIceSound() {
  const ac = getAudio(); const now = ac.currentTime;
  [880, 1108, 1320].forEach((f, i) => {
    const osc = ac.createOscillator(); osc.type = 'sine'; osc.frequency.value = f;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.2, now+i*0.07); g.gain.exponentialRampToValueAtTime(0.001, now+i*0.07+0.5);
    osc.connect(g); g.connect(ac.destination);
    osc.start(now+i*0.07); osc.stop(now+i*0.07+0.5);
  });
}

// 레벨업 효과음
function playLevelUpSound() {
  const ac = getAudio(); const now = ac.currentTime;
  [523,659,784,1047].forEach((f,i) => {
    const osc = ac.createOscillator(); osc.type = 'square'; osc.frequency.value = f;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.12, now+i*0.09); g.gain.exponentialRampToValueAtTime(0.001, now+i*0.09+0.18);
    osc.connect(g); g.connect(ac.destination);
    osc.start(now+i*0.09); osc.stop(now+i*0.09+0.18);
  });
}

// ══════════════════════════════════

function startCountdown(cb) {
  STATE = 2;
  const ovEl  = document.getElementById('overlay-countdown');
  const numEl = document.getElementById('countdown-num');
  ovEl.classList.add('show');
  const steps = ['3','2','1','GO!'];
  let i = 0;
  function step() {
    numEl.style.transition = 'none';
    numEl.style.opacity    = '1';
    numEl.style.transform  = 'scale(1)';
    numEl.textContent      = steps[i];
    requestAnimationFrame(() => requestAnimationFrame(() => {
      numEl.style.transition = 'opacity .45s, transform .45s';
      numEl.style.opacity    = '0';
      numEl.style.transform  = 'scale(1.7)';
    }));
    i++;
    if (i < steps.length) setTimeout(step, 650);
    else setTimeout(() => { ovEl.classList.remove('show'); cb(); }, 650);
  }
  step();
}

function updateLevelBadge(lvIdx) {
  const badge = document.getElementById('hud-badge');
  if (badge) badge.textContent =

// ══════════════════════════════════
//  게임 시작
// ══════════════════════════════════
function beginGame() {
  STATE = 3;
  statusEl.textContent = TOOL==='finger' ? '☝️ 검지로 터뜨려라!' : '🗡️ 손을 빠르게 휘둘러라!';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (STATE !== 3) return;
    timeLeft--;
    updateTimerRing(timeLeft);

    // 레벨 체크
    const elapsed = GAME_DURATION - timeLeft;
    let newLevel = 0;
    for (let i=0; i<LEVELS.length; i++) { if (elapsed >= LEVELS[i].t) newLevel = i; }
    if (newLevel !== currentLevel) {
      currentLevel = newLevel;
      levelBannerTimer = 90; // 약 3초
      updateLevelBadge(currentLevel);
      playLevelUpSound();
    }

    if (timeLeft <= 0) { clearInterval(timerInterval); endGame(); }
  }, 1000);
}

    document.getElementById('overlay-pause').classList.add('show');

}

// ══════════════════════════════════
//  Fruit 클래스 (특수 아이템 포함)
// ══════════════════════════════════
class Fruit {
  constructor(type='normal') {
    const lv    = LEVELS[currentLevel];
    this.type   = type;
    this.r      = type==='normal' ? 34+Math.random()*14 : 36;
    this.x      = Math.random()*(canvas.width-140)+70;
    this.y      = -60;
    this.vy     = (2.0+Math.random()*2.4) * lv.speedMult * (Date.now()<freezeUntil?0.5:1);
    this.vx     = (Math.random()-0.5)*1.2;
    this.spin   = (Math.random()-0.5)*0.055;
    this.angle  = 0;
    this.popped = false; this.poppedBy=null;
    this.opacity=1; this.scale=1;

    // 타입별 이모지/설정
    if (type==='normal') {
      this.emoji = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
      this.scoreVal = 10;
      this.glowColor = null;
    } else {
      const s = SPECIAL[type];
      this.emoji    = s.emoji;
      this.scoreVal = s.score;
      this.glowColor= s.color;
    }
    // 보너스 과일: 빠르게 사라짐
    this.lifeTime = type==='bonus' ? 180 : Infinity;
    this.age = 0;
    this.fs   = this.r*1.7;
  }

  hitTest(px,py,extra=0) { return Math.hypot(this.x-px, this.y-py) < this.r+extra; }

  update() {
    if (!this.popped) {
      const frozen = Date.now() < freezeUntil;
      this.y += this.vy * (frozen ? 0.4 : 1);
      this.x += this.vx * (frozen ? 0.4 : 1);
      this.angle += this.spin;
      this.age++;
      // 보너스 과일 시간 초과
      if (this.age > this.lifeTime) { this.opacity -= 0.08; }
    } else {
      this.opacity -= 0.055; this.scale += 0.07;
    }
  }

  pop(idx, slashAngle=null) {
    if (this.popped) return;
    this.popped=true; this.poppedBy=idx;
    this.slashAngle = slashAngle;
    const p = players[idx], now = Date.now();

    if (this.type === 'bomb') {
      // 폭탄: 점수 감소 + 흔들림
      p.score = Math.max(0, p.score + this.scoreVal);
      p.combo = 1; // 콤보 리셋
      document.getElementById(idx===0?'hud-p1-score':'hud-p2-score').textContent = p.score;
      document.getElementById(idx===0?'hud-p1-combo':'hud-p2-combo').textContent = 'BOOM! 💥';
      shakeFrames = 18;
      playBombSound();
      for (let i=0;i<14;i++) particles.push(new Particle(this.x,this.y,'💥','#FF5252'));
    } else if (this.type === 'ice') {
      // 얼음: 3초 슬로우
      p.score += this.scoreVal * p.combo;
      freezeUntil = Date.now() + 3000;
      document.getElementById(idx===0?'hud-p1-score':'hud-p2-score').textContent = p.score;
      document.getElementById(idx===0?'hud-p1-combo':'hud-p2-combo').textContent = '❄️ FREEZE!';
      setTimeout(()=>{ document.getElementById(idx===0?'hud-p1-combo':'hud-p2-combo').textContent=`x${p.combo} combo`; }, 1500);
      playIceSound();
      for (let i=0;i<10;i++) particles.push(new Particle(this.x,this.y,'❄️','#80DEEA'));
    } else {
      // 일반 / 보너스
      p.combo   = (now-p.lastPop<1000) ? Math.min(p.combo+1,10) : 1;
      p.lastPop = now;
      p.score  += this.scoreVal * p.combo;
      document.getElementById(idx===0?'hud-p1-score':'hud-p2-score').textContent = p.score;
      document.getElementById(idx===0?'hud-p1-combo':'hud-p2-combo').textContent = `x${p.combo} combo`;
      if (slashAngle!==null) playSlashSound(p.combo); else playPopSound(p.combo);
      if (p.combo>=3) playComboSound(p.combo);
      if (slashAngle!==null) {
        for (let i=0;i<6;i++) particles.push(new SlashHalf(this.x,this.y,this.emoji,slashAngle,p.color));
      }
      for (let i=0;i<8;i++) particles.push(new Particle(this.x,this.y,this.emoji,p.color));
    }
  }

  draw() {
    if (this.opacity<=0) return;
    ctx.save();
    ctx.globalAlpha=Math.max(0,this.opacity);
    ctx.translate(this.x,this.y); ctx.rotate(this.angle); ctx.scale(this.scale,this.scale);

    // 특수 아이템 글로우
    if (this.glowColor && !this.popped) {
      ctx.shadowColor = this.glowColor;
      ctx.shadowBlur  = 20 + Math.sin(Date.now()*0.006)*8;
    }
    // 보너스 과일: 깜빡임
    if (this.type==='bonus' && this.age>120) {
      ctx.globalAlpha = Math.max(0, this.opacity * (Math.sin(Date.now()*0.03)*.5+.5));
    }

    ctx.font=`${this.fs}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(this.emoji,0,0);

    if (this.popped && this.poppedBy!==null) {
      ctx.shadowBlur=0;
      ctx.font='bold 20px Nunito,sans-serif';
      const label = this.type==='bomb' ? '-30💥' : this.type==='ice' ? '+15❄️' : `+${this.scoreVal*players[this.poppedBy].combo}`;
      ctx.fillStyle = this.glowColor || players[this.poppedBy].color;
      ctx.fillText(label, 0, -this.r-8);
    }
    ctx.restore();
  }
}

// ══════════════════════════════════
//  Particle
// ══════════════════════════════════
class Particle {
  constructor(x,y,emoji,color) {
    this.x=x; this.y=y;
    this.vx=(Math.random()-0.5)*12; this.vy=(Math.random()-1.4)*10;
    this.life=1;
    this.emoji=Math.random()<0.25?'✨':emoji;
    this.size=12+Math.random()*14;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.vy+=0.38; this.life-=0.038; }
  draw() {
    if (this.life<=0) return;
    ctx.save(); ctx.globalAlpha=Math.max(0,this.life);
    ctx.font=`${this.size}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(this.emoji,this.x,this.y);
    ctx.restore();
  }
}

// ══════════════════════════════════
//  슬래시 궤적 그리기
// ══════════════════════════════════
function drawSlashTrail(p, idx, solo) {
  if (!p.visible) return;

  // VS 영역 배경
  if (!solo) {
    ctx.save(); ctx.fillStyle=p.dimColor;
    ctx.fillRect(idx===0?0:canvas.width/2, 0, canvas.width/2, canvas.height);
    ctx.restore();
  }

  const trail = p.trail;
  if (trail.length < 2) {
    // 궤적 없을 때 손 위치만 표시
    ctx.save();
    ctx.font='28px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.globalAlpha=0.7;
    ctx.fillText('🗡️', p.x, p.y);
    ctx.restore();
    if (!solo) {
      ctx.save(); ctx.font='bold 12px Fredoka One,cursive';
      ctx.fillStyle=p.color; ctx.textAlign='center';
      ctx.fillText(idx===0?'P1':'P2', p.x, p.y-26);
      ctx.restore();
    }
    return;
  }

  // 속도 계산 (최근 2점)
  const last = trail[trail.length-1];
  const prev = trail[trail.length-2];
  const spd  = Math.hypot(last.x-prev.x, last.y-prev.y);
  const isFast = spd >= SLASH_SPEED_MIN;

  // ── 칼날 궤적 그라디언트 ──
  if (trail.length >= 2) {
    for (let i=1; i<trail.length; i++) {
      const t  = i / trail.length;
      const a  = t * (isFast ? 0.9 : 0.35);
      const lw = t * (isFast ? 7 : 3);
      ctx.save();
      ctx.strokeStyle = p.color;
      ctx.lineWidth   = lw;
      ctx.lineCap     = 'round';
      ctx.globalAlpha = a;
      ctx.shadowColor = p.color;
      ctx.shadowBlur  = isFast ? 18 : 4;
      ctx.beginPath();
      ctx.moveTo(trail[i-1].x, trail[i-1].y);
      ctx.lineTo(trail[i].x,   trail[i].y);
      ctx.stroke();
      ctx.restore();
    }

    // 빠를 때 흰 코어 라인
    if (isFast) {
      ctx.save();
      ctx.strokeStyle='rgba(255,255,255,0.85)';
      ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(trail[trail.length-3]?.x ?? trail[0].x, trail[trail.length-3]?.y ?? trail[0].y);
      ctx.lineTo(last.x, last.y);
      ctx.stroke();
      ctx.restore();

      // 끝에 스파크 이모지
      ctx.save();
      ctx.font='18px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.globalAlpha=0.9;
      ctx.fillText('⚡', last.x, last.y);
      ctx.restore();
    }
  }

  // 손 끝 아이콘
  ctx.save();
  ctx.font=(isFast?'32px':'24px')+' serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.globalAlpha=isFast?1:0.65;
  ctx.fillText('🗡️', p.x, p.y);
  ctx.restore();

  if (!solo) {
    ctx.save(); ctx.font='bold 12px Fredoka One,cursive';
    ctx.fillStyle=p.color; ctx.textAlign='center';
    ctx.fillText(idx===0?'P1':'P2', p.x, p.y-28);
    ctx.restore();
  }
}

// ══════════════════════════════════
//  슬래시 충돌 판정
// ══════════════════════════════════
function processSlash(idx) {
  const p = players[idx];
  if (!p.visible || p.trail.length < 2) return;

  const t1 = p.trail[p.trail.length-2];
  const t2 = p.trail[p.trail.length-1];
  const spd = Math.hypot(t2.x-t1.x, t2.y-t1.y);
  if (spd < SLASH_SPEED_MIN) return;

  const angle = Math.atan2(t2.y-t1.y, t2.x-t1.x);

  fruits.forEach(f => {
    if (f.popped) return;
    // 선분-원 거리 체크
    const dx=t2.x-t1.x, dy=t2.y-t1.y;
    const len=Math.hypot(dx,dy);
    if(len===0) return;
    const t=Math.max(0,Math.min(1,((f.x-t1.x)*dx+(f.y-t1.y)*dy)/(len*len)));
    const cx=t1.x+t*dx, cy=t1.y+t*dy;
    const dist=Math.hypot(f.x-cx, f.y-cy);
    if (dist < f.r + SLASH_HIT_WIDTH) {
      f.pop(idx, angle);
      // 슬래시 섬광 파티클
      for(let i=0;i<4;i++) particles.push(new Particle(f.x,f.y,'✨',p.color));
    }
  });
}

// ══════════════════════════════════
//  SlashHalf — 잘린 과일 조각
// ══════════════════════════════════
class SlashHalf {
  constructor(x,y,emoji,slashAngle,color) {
    // 칼 방향에 수직으로 두 조각이 튀어나감
    const perp = slashAngle + Math.PI/2;
    const side = Math.random()<0.5 ? 1 : -1;
    const spd  = 4 + Math.random()*4;
    this.x=x; this.y=y;
    this.vx = Math.cos(perp)*spd*side + (Math.random()-0.5)*3;
    this.vy = Math.sin(perp)*spd*side - 2 - Math.random()*3;
    this.life = 1;
    this.emoji = emoji;
    this.size  = 20 + Math.random()*10;
    this.spin  = (Math.random()-0.5)*0.25;
    this.angle = 0;
    this.clipSide = side; // +1 위쪽 반, -1 아래쪽 반
    this.slashAngle = slashAngle;
  }
  update() {
    this.x+=this.vx; this.y+=this.vy;
    this.vy+=0.3; this.angle+=this.spin;
    this.life-=0.03;
  }
  draw() {
    if(this.life<=0) return;
    ctx.save();
    ctx.globalAlpha=Math.max(0,this.life);
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);
    // 클리핑으로 반쪽만 보이게
    ctx.beginPath();
    const cx2 = Math.cos(this.slashAngle)*60*this.clipSide;
    const cy2 = Math.sin(this.slashAngle)*60*this.clipSide;
    ctx.moveTo(0,0);
    ctx.lineTo( cy2,-cx2); ctx.lineTo( cy2+cx2*2,-cx2+cy2*2);
    ctx.lineTo(-cy2+cx2*2, cx2+cy2*2); ctx.lineTo(-cy2,cx2);
    ctx.closePath(); ctx.clip();
    ctx.font=`${this.size}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(this.emoji,0,0);
    ctx.restore();
  }
}

// ══════════════════════════════════
//  검지 십자선
// ══════════════════════════════════
function drawCrosshair(p, idx, solo) {
  if (!p.visible) return;
  const {x,y,color}=p;
  if (!solo) {
    ctx.save(); ctx.fillStyle=p.dimColor;
    ctx.fillRect(idx===0?0:canvas.width/2, 0, canvas.width/2, canvas.height);
    ctx.restore();
  }
  const r=20,gap=7;
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=3;
  ctx.shadowColor=color; ctx.shadowBlur=14;
  ctx.beginPath();
  ctx.moveTo(x-r,y); ctx.lineTo(x-gap,y);
  ctx.moveTo(x+gap,y); ctx.lineTo(x+r,y);
  ctx.moveTo(x,y-r); ctx.lineTo(x,y-gap);
  ctx.moveTo(x,y+gap); ctx.lineTo(x,y+r);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,gap-1,0,Math.PI*2);
  ctx.fillStyle=color; ctx.globalAlpha=0.7; ctx.fill();
  ctx.restore();
  ctx.save(); ctx.font='bold 12px Fredoka One,cursive';
  ctx.fillStyle=color; ctx.textAlign='center';
  ctx.fillText(solo?'☝️':(idx===0?'P1':'P2'),x,y-r-6);
  ctx.restore();
}


// ══════════════════════════════════
//  Mediapipe
// ══════════════════════════════════
const hands = new Hands({ locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands:2, modelComplexity:1, minDetectionConfidence:0.55, minTrackingConfidence:0.55 });

hands.onResults(results => {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  players.forEach(p=>{ p.visible=false; });

  if (results.multiHandLandmarks?.length>0) {
    const detected=results.multiHandLandmarks;

    if (MODE==='solo') {
      const lm=detected[0];
      const ref = TOOL==='slash' ? palmCenter(lm) : {x:lm[8].x, y:lm[8].y};
      players[0].x=ref.x*canvas.width; players[0].y=ref.y*canvas.height;
      players[0].visible=true;
    } else {
      // multiHandedness로 Left/Right 구분 → canvas scaleX(-1)이므로
      // Mediapipe "Right" = 화면 왼쪽 = P1, "Left" = 화면 오른쪽 = P2
      const handedness = results.multiHandedness || [];
      detected.forEach((lm, i) => {
        const label = handedness[i]?.label || '';
        const pidx  = label === 'Right' ? 0 : 1; // Right손=P1, Left손=P2
        const ref   = TOOL==='slash' ? palmCenter(lm) : {x:lm[8].x, y:lm[8].y};
        players[pidx].x       = ref.x * canvas.width;
        players[pidx].y       = ref.y * canvas.height;
        players[pidx].visible = true;
      });
    }

    if (STATE<=2) {
      const need=MODE==='solo'?1:2;
      const found=Math.min(detected.length,need);
      statusEl.textContent=found>=need?'✅ 손 감지 완료!':`✋ ${found}/${need} 손 감지 중...`;
    }
  }

  // 슬래시 trail 업데이트
  if (TOOL==='slash') {
    const pCount = MODE==='solo'?1:2;
    for(let i=0;i<pCount;i++) {
      const p=players[i];
      if(p.visible) {
        p.trail.push({x:p.x, y:p.y});
        if(p.trail.length > SLASH_TRAIL_LEN) p.trail.shift();
      } else {
        if(p.trail.length>0) p.trail.shift(); // 손 사라지면 trail 서서히 소멸
      }
    }
  }

  // 시각 요소 그리기
  if (STATE>=2&&STATE<=4) {
    if (TOOL==='slash') {
      if (MODE==='solo') drawSlashTrail(players[0],0,true);
      else { drawSlashTrail(players[0],0,false); drawSlashTrail(players[1],1,false); }
    } else {
      if (MODE==='solo') drawCrosshair(players[0],0,true);
      else { drawCrosshair(players[0],0,false); drawCrosshair(players[1],1,false); }
    }
  }

  // 과일 로직
  if (STATE===3) {
    const lv = LEVELS[currentLevel];
    const r  = Math.random();
    if (r < lv.spawnRate) {
      // 특수 아이템 확률 판정
      const sr = Math.random();
      if      (sr < SPECIAL.bomb.prob)  fruits.push(new Fruit('bomb'));
      else if (sr < SPECIAL.bomb.prob + SPECIAL.bonus.prob) fruits.push(new Fruit('bonus'));
      else if (sr < SPECIAL.bomb.prob + SPECIAL.bonus.prob + SPECIAL.ice.prob) fruits.push(new Fruit('ice'));
      else    fruits.push(new Fruit('normal'));
    }

    const pCount=MODE==='solo'?1:2;
    if (TOOL==='finger') {
      fruits.forEach(f=>{
        if (f.popped) return;
        for (let i=0;i<pCount;i++) {
          if (players[i].visible&&f.hitTest(players[i].x,players[i].y,18)) { f.pop(i,null); break; }
        }
      });
    } else {
      for (let i=0;i<pCount;i++) processSlash(i);
    }
  }

  fruits    = fruits.filter(f=>{ f.update(); f.draw(); return f.y<canvas.height+100&&f.opacity>0; });
  particles = particles.filter(p=>{ p.update(); p.draw(); return p.life>0; });

  // ── 얼음 슬로우 오버레이 ──
  if (Date.now() < freezeUntil) {
    ctx.save();
    ctx.fillStyle = 'rgba(128,222,234,0.08)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font='bold 18px Nunito,sans-serif';
    ctx.fillStyle='rgba(128,222,234,0.7)';
    ctx.textAlign='center';
    ctx.fillText('❄️  FREEZE  ❄️', canvas.width/2, canvas.height-50);
    ctx.restore();
  }

  // ── 화면 흔들림 (폭탄) ──
  if (shakeFrames > 0) {
    shakeFrames--;
    const s = shakeFrames * 1.2;
    canvas.style.transform = `scaleX(-1) translate(${(Math.random()-0.5)*s}px,${(Math.random()-0.5)*s}px)`;
  } else {
    canvas.style.transform = 'scaleX(-1)';
  }

  // ── 레벨업 배너 ──
  if (levelBannerTimer > 0) {
    levelBannerTimer--;
    const alpha = Math.min(1, levelBannerTimer/20);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font='bold 48px Fredoka One,cursive';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#FFD740';
    ctx.shadowColor='#FFD740'; ctx.shadowBlur=30;
    ctx.fillText(`🔥 ${LEVELS[currentLevel].label} 🔥`, canvas.width/2, canvas.height/2);
    ctx.restore();
  }
});

// ══════════════════════════════════
//  카메라 시작
// ══════════════════════════════════
window.onload = () => {
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });

  const camera=new Camera(video,{
    onFrame: async()=>{ await hands.send({image:video}); },
    width:1280, height:720
  });
  camera.start()
    .then(()=>{ statusEl.textContent='✋ 모드를 선택하세요'; })
    .catch(()=>{ statusEl.textContent='❌ 카메라 접근 실패 — 브라우저 권한을 확인하세요'; });
};
</script>
